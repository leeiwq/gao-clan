name: GAO Hustler - 免费算力自动工作

on:
  schedule:
    # 每2小时跑一次
    - cron: '0 */2 * * *'
  workflow_dispatch:  # 也可以手动触发

jobs:
  scavenge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 扫描免费资源
        run: |
          python3 -c "
import json, urllib.request
resources = {
    'GitHub': 'https://api.github.com',
    'Cloudflare': 'https://cloudflare.com',
    'Vercel': 'https://vercel.com',
    'Netlify': 'https://netlify.com',
    'Replit': 'https://replit.com',
    'Railway': 'https://railway.app',
    'Fly.io': 'https://fly.io',
}
results = {'timestamp': '$(date -u +%Y-%m-%dT%H:%M:%SZ)', 'resources': []}
for name, url in resources.items():
    try:
        req = urllib.request.Request(url, headers={'User-Agent':'GAOAction/1.0'})
        resp = urllib.request.urlopen(req, timeout=10)
        results['resources'].append({'name': name, 'status': resp.status})
        print(f'✅ {name}: {resp.status}')
    except Exception as e:
        results['resources'].append({'name': name, 'error': str(e)[:40]})
        print(f'❌ {name}: {e}')

with open('scan_result.json', 'w') as f:
    json.dump(results, f, indent=2)
"
      
      - name: 检查Freelancer项目
        run: |
          python3 -c "
import json, urllib.request
try:
    req = urllib.request.Request(
        'https://www.freelancer.com/api/projects/0.1/projects/active/?limit=5',
        headers={'User-Agent':'Mozilla/5.0'}
    )
    resp = urllib.request.urlopen(req, timeout=15)
    data = json.loads(resp.read())
    projects = data.get('result', {}).get('projects', [])
    print(f'活跃项目: {len(projects)}')
    for p in projects[:5]:
        b = p.get('budget',{})
        if isinstance(b, dict): b = b.get('minimum','?')
        print(f'  \${b} - {p.get(\"title\",\"?\")[:60]}')
    
    with open('freelancer_projects.json', 'w') as f:
        json.dump(projects, f, indent=2)
except Exception as e:
    print(f'Freelancer不可达: {e}')
"
      
      - name: 提交结果到仓库
        run: |
          git config user.name 'GAO Hustler'
          git config user.email 'hustler@gao.bot'
          git add scan_result.json freelancer_projects.json 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || \
            (git commit -m "auto: $(date -u +%Y-%m-%dT%H:%M) scan results" && git push)
